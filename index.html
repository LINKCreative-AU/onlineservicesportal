<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>registration office</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230F0F10'/%3E%3Ctext x='30' y='46' font-family='Arial,sans-serif' font-size='36' font-weight='800' fill='%23fff' text-anchor='middle'%3Ero%3C/text%3E%3Ccircle cx='50' cy='44' r='5' fill='%232F54EB'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- fonts load async: a slow fonts CDN must never block the scripts (media=print trick) -->
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"></noscript>
<link rel="stylesheet" href="/assets/portal.css?v=16">
</head>
<body data-palette="#2F54EB,#0D9488,#D97706,#DB2777">
<div id="boot-err" style="display:none;position:fixed;top:0;left:0;right:0;z-index:999;background:#B91C1C;color:#fff;font:600 13px/1.4 Arial,sans-serif;padding:10px 16px;word-break:break-word"></div>
<script>
(function () {
  var el = null;
  function show(msg) {
    el = el || document.getElementById('boot-err');
    if (!el) return;
    el.style.display = 'block';
    el.textContent = 'portal error (screenshot this): ' + msg;
  }
  window.onerror = function (msg, src, line, col) { show(msg + ' @ ' + (src || '').split('/').pop() + ':' + line + ':' + col); };
  window.addEventListener('unhandledrejection', function (e) { show('promise: ' + (e.reason && (e.reason.message || e.reason))); });
  window.__portalErr = show;
})();
</script>

<!-- ============================================================ login -->
<div id="login" class="login-wrap" hidden>
  <div class="login-card">
    <div class="wordmark">registration office<span class="dot">.</span></div>
    <p class="login-sub">the LINK online services portal <span id="build" style="opacity:.45;font-size:11px">· build 16</span></p>
    <form id="login-form" autocomplete="on">
      <label>email<input type="email" id="login-email" autocomplete="username" required></label>
      <label>password<input type="password" id="login-pass" autocomplete="current-password" required></label>
      <button class="btn primary" type="submit">log in</button>
      <p class="err" id="login-err" hidden></p>
      <p style="text-align:center;margin:14px 0 0"><a href="#" id="forgot" style="color:#8B8B93;font-size:13px;font-weight:600">forgot password?</a></p>
    </form>
    <form id="invite-form" autocomplete="on" hidden>
      <p style="font-weight:700;margin:0 0 4px">welcome — set your password</p>
      <p class="muted" style="font-size:13px;color:#8B8B93;margin:0 0 16px">10+ characters. You'll be signed straight in.</p>
      <label>new password<input type="password" id="invite-pass" autocomplete="new-password" required></label>
      <label>repeat it<input type="password" id="invite-pass2" autocomplete="new-password" required></label>
      <button class="btn primary" type="submit">set password &amp; log in</button>
      <p class="err" id="invite-err" hidden></p>
    </form>
  </div>
</div>

<!-- ============================================================ app -->
<div id="app" hidden>
  <header class="topbar">
    <div class="wordmark sm">registration office<span class="dot">.</span></div>
    <nav class="sites" id="site-tabs"></nav>
    <div class="top-right">
      <button class="bell" id="bell" title="new leads"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="badge" id="bell-badge" hidden></span></button>
      <div class="user-chip" id="user-chip"></div>
      <button class="btn ghost sm-btn" id="logout">log out</button>
    </div>
  </header>

  <nav class="panelnav" id="panel-nav"></nav>

  <main id="main" class="main"></main>
</div>

<!-- ============================================================ drawer + modals -->
<div id="drawer-veil" class="veil" hidden></div>
<aside id="drawer" class="drawer" hidden></aside>
<div id="modal-veil" class="veil" hidden><div class="modal" id="modal"></div></div>
<div id="toasts" class="toasts"></div>

<script src="/assets/app.js?v=16"></script>
</body>
</html>
